name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up .NET 10 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup --no-progress -y

      - name: Resolve release version
        id: version
        shell: powershell
        run: |
          $project = [xml](Get-Content 'MouseTool.csproj')
          $projectVersion = $project.Project.PropertyGroup.Version | Select-Object -First 1

          if (-not $projectVersion) {
              throw 'Version was not found in MouseTool.csproj.'
          }

          if ('${{ github.ref_type }}' -eq 'tag') {
              $tagVersion = '${{ github.ref_name }}' -replace '^v', ''

              if ($tagVersion -ne $projectVersion) {
                  throw "Tag version '$tagVersion' does not match project version '$projectVersion'."
              }

              $releaseVersion = $tagVersion
          }
          else {
              $releaseVersion = $projectVersion
          }

          "release_version=$releaseVersion" >> $env:GITHUB_OUTPUT

      - name: Build release artifacts
        shell: powershell
        run: |
          $env:DOTNET_CLI_HOME = "$PWD\.dotnet-home"
          $env:NUGET_PACKAGES = "$PWD\.nuget\packages"
          $env:NUGET_CONFIG_FILE = "$PWD\NuGet.Config"
          powershell -ExecutionPolicy Bypass -File .\publish-release.ps1 -AppVersion '${{ steps.version.outputs.release_version }}'

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $false
          $tag = '${{ github.ref_name }}'
          $title = 'MouseTool v${{ steps.version.outputs.release_version }}'
          $files = @(
            'release/MouseTool-Setup.exe',
            'release/MouseTool-win-x64.zip',
            'release/MouseTool-CHANGELOG.md',
            'release/update.json'
          )

          & gh release view $tag --repo '${{ github.repository }}' 1>$null 2>$null
          $releaseExists = ($LASTEXITCODE -eq 0)

          if ($releaseExists) {
            & gh release upload $tag $files --clobber --repo '${{ github.repository }}'
          }
          else {
            & gh release create $tag $files --title $title --generate-notes --repo '${{ github.repository }}'
          }
